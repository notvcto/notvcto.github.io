version: 2
# Touching this file after the repository migration triggers an immediate
# Dependabot version-update check.
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
      next:
        patterns:
          - "next"
          - "eslint-config-next"
