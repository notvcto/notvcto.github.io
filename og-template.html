<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>OG Image Template — notvcto</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.1/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.1.1/index.css">
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pf: 'Playfair Display', Georgia, serif;
      --gm: 'Geist Mono', 'Courier New', monospace;
      --bg: #0d0d0d;
      --fg: #fefefe;
    }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      font-family: var(--gm);
      color: #888;
    }

    /* ── OG Canvas ── */
    #stage {
      position: relative;
      width: 1200px;
      height: 630px;
      background: var(--bg);
      overflow: hidden;
      flex-shrink: 0;
    }

    #gl {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(13,13,13,0.93) 0%,
        rgba(13,13,13,0.75) 50%,
        transparent 75%
      );
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 88px;
      gap: 20px;
    }

    /* ── Template content ── */
    .og-tag {
      font-family: var(--gm);
      font-size: 18px;
      color: #555;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .og-title {
      font-family: var(--pf);
      font-size: 64px;
      font-weight: 700;
      font-style: italic;
      color: var(--fg);
      line-height: 1.12;
      max-width: 620px;
    }

    .og-mark {
      font-size: 52px;
      line-height: 1.05;
      color: var(--fg);
    }
    .og-mark .serif { font-family: var(--pf); font-style: italic; }
    .og-mark .mono  { font-family: var(--gm); font-weight: 500; }

    .og-desc {
      font-family: var(--gm);
      font-size: 22px;
      color: #666;
      max-width: 580px;
    }

    .og-url {
      font-family: var(--gm);
      font-size: 16px;
      color: #333;
      position: absolute;
      bottom: 48px;
      left: 88px;
    }

    /* ── Controls (hidden in screenshot) ── */
    #controls {
      width: 1200px;
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .tabs {
      display: flex;
      gap: 8px;
    }

    .tab {
      font-family: var(--gm);
      font-size: 12px;
      padding: 7px 16px;
      background: transparent;
      color: #555;
      border: 0.5px solid #333;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab:hover { color: #888; border-color: #555; }
    .tab.active { color: #fefefe; border-color: #666; background: #1a1a1a; }

    .fields {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 10px;
      letter-spacing: 2px;
      color: #444;
      text-transform: uppercase;
    }

    .field input {
      background: #1a1a1a;
      border: 0.5px solid #333;
      border-radius: 5px;
      padding: 8px 12px;
      font-family: var(--gm);
      font-size: 13px;
      color: #ccc;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #555; }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button.dl {
      font-family: var(--gm);
      font-size: 13px;
      padding: 10px 24px;
      background: #fefefe;
      color: #0d0d0d;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button.dl:hover { opacity: 0.85; }
    button.dl:disabled { opacity: 0.5; cursor: wait; }

    .hint {
      font-size: 12px;
      color: #333;
    }

    /* Hide controls when ?screenshot=1 */
    body.screenshot #controls { display: none !important; }
    body.screenshot { background: var(--bg); padding: 0; justify-content: flex-start; }
  </style>
</head>
<body>

<div id="stage">
  <canvas id="gl"></canvas>
  <div id="overlay">
    <!-- populated by JS -->
  </div>
</div>

<div id="controls">
  <div class="tabs">
    <button class="tab active" data-t="post">blog post</button>
    <button class="tab" data-t="home">blog home</button>
    <button class="tab" data-t="portfolio">portfolio</button>
  </div>
  <div class="fields" id="fields"></div>
  <div class="actions">
    <button class="dl" id="dlbtn">download 1200×630 PNG</button>
    <span class="hint" id="dlhint">og:image + post header</span>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────

const W = 1200, H = 630;
const PF = "'Playfair Display', Georgia, serif";
const GM = "'Geist Mono', 'Courier New', monospace";

// Read URL params (for build-time / automated screenshot)
const params = new URLSearchParams(location.search);
if (params.get('screenshot') === '1') document.body.classList.add('screenshot');

// ── Templates ────────────────────────────────────────────────────────────────

const templates = {
  post: {
    fields: [
      { id: 'category', label: 'Category',    val: params.get('category') || 'ZERO' },
      { id: 'title',    label: 'Post Title',  val: params.get('title')    || 'I got tired of AI that lies to be polite' },
      { id: 'desc',     label: 'Description', val: params.get('desc')     || 'A minimum viable security reasoning model.' },
      { id: 'url',      label: 'URL',         val: params.get('url')      || 'notvc.to/blog/zero-announcement' },
    ],
    html(d) {
      return `
        <div class="og-tag">${esc(d.category)}</div>
        <div class="og-title">${esc(d.title)}</div>
        <div class="og-desc">${esc(d.desc)}</div>
        <div class="og-url">${esc(d.url)}</div>
      `;
    },
    canvas(ctx, d) {
      const x = 88;
      ctx.fillStyle = '#555';
      ctx.font = `400 20px ${GM}`;
      ctx.fillText(d.category.toUpperCase(), x, 115);

      ctx.fillStyle = '#fefefe';
      ctx.font = `400 72px "Playfair Display", Georgia, serif`;
      const lines = wrapText(ctx, d.title, x, 225, 580, 86);

      ctx.fillStyle = '#666';
      ctx.font = `400 24px "Geist Mono", "Courier New", monospace`;
      ctx.fillText(d.desc, x, 240 + lines * 86);

      ctx.fillStyle = '#333';
      ctx.font = `400 17px "Geist Mono", "Courier New", monospace`;
      ctx.fillText(d.url, x, 598);
    },
  },

  home: {
    fields: [
      { id: 'tagline', label: 'Tagline',  val: params.get('tagline') || 'Technical writing by Victor Soto' },
      { id: 'sub',     label: 'Subtitle', val: params.get('sub')     || 'Engineering · Security · Research' },
      { id: 'url',     label: 'URL',      val: params.get('url')     || 'notvc.to/blog' },
    ],
    html(d) {
      return `
        <div class="og-mark">
          <div><span class="serif">not<span class="mono">_</span></span></div>
          <div><span class="mono">${esc(d.tagline.length < 20 ? d.tagline : 'vcto')}</span></div>
        </div>
        <div class="og-title" style="font-size:54px">${esc(d.tagline)}</div>
        <div class="og-desc">${esc(d.sub)}</div>
        <div class="og-url">${esc(d.url)}</div>
      `;
    },
    canvas(ctx, d) {
      const x = 88;
      ctx.fillStyle = '#fefefe';
      ctx.font = `italic 44px "Playfair Display", Georgia, serif`;
      ctx.fillText('not_', x, 130);
      ctx.font = `500 44px "Geist Mono", "Courier New", monospace`;
      ctx.fillText('vcto', x, 183);

      ctx.font = `400 62px "Playfair Display", Georgia, serif`;
      const lines = wrapText(ctx, d.tagline, x, 300, 580, 76);

      ctx.fillStyle = '#555';
      ctx.font = `400 22px "Geist Mono", "Courier New", monospace`;
      ctx.fillText(d.sub, x, 308 + lines * 76);

      ctx.fillStyle = '#333';
      ctx.font = `400 17px "Geist Mono", "Courier New", monospace`;
      ctx.fillText(d.url, x, 598);
    },
  },

  portfolio: {
    fields: [
      { id: 'name', label: 'Name',  val: params.get('name') || 'NOTVCTO' },
      { id: 'role', label: 'Role',  val: params.get('role') || 'Systems Architect & Vulnerability Researcher' },
      { id: 'url',  label: 'URL',   val: params.get('url')  || 'notvc.to' },
    ],
    html(d) {
      return `
        <div class="og-title" style="font-size:88px;letter-spacing:-1px">${esc(d.name)}</div>
        <div class="og-desc" style="font-size:20px;letter-spacing:2px;color:#555;text-transform:uppercase">${esc(d.role)}</div>
        <div class="og-url">${esc(d.url)}</div>
      `;
    },
    canvas(ctx, d) {
      const x = 88;
      ctx.fillStyle = '#fefefe';
      ctx.font = `400 96px "Playfair Display", Georgia, serif`;
      ctx.fillText(d.name, x, 290);

      ctx.fillStyle = '#555';
      ctx.font = `400 22px "Geist Mono", "Courier New", monospace`;
      ctx.fillText(d.role, x, 370);

      ctx.fillStyle = '#333';
      ctx.font = `400 17px "Geist Mono", "Courier New", monospace`;
      ctx.fillText(d.url, x, 598);
    },
  },
};

// ── State ─────────────────────────────────────────────────────────────────────

let type = params.get('type') || 'post';
let data = {};

function initData(t) {
  data = {};
  templates[t].fields.forEach(f => { data[f.id] = f.val; });
}

function renderOverlay() {
  document.getElementById('overlay').innerHTML = templates[type].html(data);
}

function renderFields() {
  const t = templates[type];
  const el = document.getElementById('fields');
  el.innerHTML = t.fields.map(f => `
    <div class="field">
      <label>${f.label}</label>
      <input type="text" data-id="${f.id}" value="${esc(data[f.id])}">
    </div>
  `).join('');
  el.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      data[e.target.dataset.id] = e.target.value;
      renderOverlay();
    });
  });
}

// ── Three.js sphere ───────────────────────────────────────────────────────────

const glCanvas = document.getElementById('gl');
const renderer = new THREE.WebGLRenderer({
  canvas: glCanvas,
  antialias: true,
  alpha: true,
  preserveDrawingBuffer: true,
});
renderer.setSize(W, H);
renderer.setPixelRatio(1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
camera.position.set(0, 0, 5);

const uniforms = { uTime: { value: 0 } };

const vertexShader = `
  uniform float uTime;
  varying vec2 vUv;
  varying float vDisplacement;

  vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
  vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
  vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

  float snoise(vec3 v) {
    const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g  = step(x0.yzx, x0.xyz);
    vec3 l  = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
      i.z + vec4(0.0, i1.z, i2.z, 1.0))
      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3  ns = n_ * D.wyz - D.xzx;
    vec4  j  = p - 49.0 * floor(p * ns.z * ns.z);
    vec4  x_ = floor(j * ns.z);
    vec4  y_ = floor(j - 7.0 * x_);
    vec4  x  = x_ * ns.x + ns.yyyy;
    vec4  y  = y_ * ns.x + ns.yyyy;
    vec4  h  = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0) * 2.0 + 1.0;
    vec4 s1 = floor(b1) * 2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m * m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
  }

  void main() {
    vUv = uv;
    float noise = snoise(position * 1.5 + uTime * 0.15);
    float displacement = noise * 0.15;
    vDisplacement = displacement;
    vec3 newPosition = position + normal * displacement;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
  }
`;

const fragmentShader = `
  varying vec2 vUv;
  varying float vDisplacement;

  void main() {
    float intensity = 0.3 + vDisplacement * 2.0;
    vec3 color = vec3(intensity);
    float line = smoothstep(0.0, 0.02, abs(fract(vUv.x * 20.0) - 0.5));
    line *= smoothstep(0.0, 0.02, abs(fract(vUv.y * 20.0) - 0.5));
    gl_FragColor = vec4(color * (1.0 - line * 0.5), 0.6);
  }
`;

const geo  = new THREE.IcosahedronGeometry(1.8, 20);
const mat  = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms, transparent: true, wireframe: true });
const mesh = new THREE.Mesh(geo, mat);
mesh.position.x = 0.6;
scene.add(mesh);

let prev = 0;
function animate(t) {
  requestAnimationFrame(animate);
  const dt = (t - prev) / 1000;
  prev = t;
  uniforms.uTime.value += dt;
  mesh.rotation.y += dt * 0.05;
  renderer.render(scene, camera);
}

// ── Initialization & Fonts ───────────────────────────────────────────────────

async function init() {
  // Load canvas fonts
  try {
    const pf = new FontFace(
      'Playfair Display',
      'url(https://cdn.jsdelivr.net/npm/@fontsource/playfair-display@5.1.1/files/playfair-display-latin-400-normal.woff2)',
      { weight: '400', style: 'normal' }
    );
    const gm = new FontFace(
      'Geist Mono',
      'url(https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.1.1/files/geist-mono-latin-500-normal.woff2)',
      { weight: '500' }
    );
    await Promise.all([pf.load(), gm.load()]);
    document.fonts.add(pf);
    document.fonts.add(gm);
  } catch (e) { /* fallback to system fonts */ }

  initData(type);
  renderOverlay();
  
  // ── Tab switching ─────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(btn => {
    if (btn.dataset.t === type) btn.classList.add('active');
    else btn.classList.remove('active');

    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      type = btn.dataset.t;
      initData(type);
      renderOverlay();
      renderFields();
    });
  });

  renderFields();
  animate(0);
  
  // Signal to puppeteer that we're ready to capture
  setTimeout(() => document.body.classList.add('ready'), 100);
}

init();

// ── Download ──────────────────────────────────────────────────────────────────

document.getElementById('dlbtn').addEventListener('click', async function () {
  const btn = this;
  btn.textContent = 'capturing...';
  btn.disabled = true;

  renderer.render(scene, camera);

  const out = document.createElement('canvas');
  out.width = W; out.height = H;
  const ctx = out.getContext('2d');

  // Background
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  // Sphere
  ctx.drawImage(glCanvas, 0, 0);

  // Gradient
  const g = ctx.createLinearGradient(0, 0, W * 0.72, 0);
  g.addColorStop(0,    'rgba(13,13,13,0.93)');
  g.addColorStop(0.55, 'rgba(13,13,13,0.75)');
  g.addColorStop(1,    'rgba(13,13,13,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Text
  templates[type].canvas(ctx, data);

  out.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url;
    a.download = `notvcto-og-${type}.png`;
    a.click();
    URL.revokeObjectURL(url);
    btn.textContent = 'download 1200×630 PNG';
    btn.disabled = false;
  });
});

// ── Helpers ───────────────────────────────────────────────────────────────────

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  const lines = [];
  for (const word of words) {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
  return lines.length;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
